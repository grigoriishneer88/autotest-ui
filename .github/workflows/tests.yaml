name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run playwright tests with pytest and generate allure results
        continue-on-error: true
        run: xvfb-run pytest -m regression --alluredir=./allure-results --numprocesses=2

      # ИСПРАВЛЕНО: Вытягиваем историю во временную папку вне рабочей директории git
      - name: Load Allure History
        if: always()
        run: |
          mkdir -p allure-results
          TEMP_DIR=$(mktemp -d)
          git clone --branch gh-pages --single-branch https://github.com/${{ github.repository }}.git "$TEMP_DIR" || true
          if [ -d "$TEMP_DIR/history" ]; then
            cp -r "$TEMP_DIR/history" ./allure-results/
          fi

      - name: Install Allure CLI and Generate Report
        if: always()
        run: |
          sudo wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          sudo tar -zxvf allure-2.24.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.24.0/bin/allure /usr/bin/allure
          
          # ПОЛНОЕ УДАЛЕНИЕ ВИДЕО И ТРЕЙСОВ
          if [ -d "allure-results" ]; then
            find ./allure-results -type f \( -name "*.zip" -o -name "*.webm" -o -name "*.mp4" \) -delete || true
          fi
          
          allure generate ./allure-results --clean -o ./allure-history

      # Теперь пуш пойдет строго в gh-pages без пересечения с локальными ветками
      - name: Deploy on GitHub pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true