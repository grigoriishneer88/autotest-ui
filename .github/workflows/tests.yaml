name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run playwright tests with pytest and generate allure results
        run: xvfb-run pytest -m regression --alluredir=./allure-results --numprocesses=2

      # Безопасно вытягиваем историю через нативный git без падения пайплайна
      - name: Load Allure History
        if: always()
        run: |
          mkdir -p allure-results
          git clone --branch gh-pages --single-branch https://github.com/${{ github.repository }}.git gh-pages-dir || true
          if [ -d "gh-pages-dir/history" ]; then
            cp -r gh-pages-dir/history ./allure-results/
          fi

      - name: Install Allure CLI and Generate Report
        if: always()
        run: |
          sudo wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          sudo tar -zxvf allure-2.24.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.24.0/bin/allure /usr/bin/allure
          
          # УДАЛЯЕМ АРТЕФАКТЫ УСПЕШНЫХ ТЕСТОВ ПЕРЕД СБОРКОЙ:
          # Ищем файлы-результаты (*-result.json), у которых статус "passed".
          # Находим связанные с ними uuid и удаляем соответствующие тяжелые файлы (attachments) видео и трейсов.
          if [ -d "allure-results" ]; then
            grep -l '"status": "passed"' allure-results/*-result.json | while read -r file; do
              uuid=$(basename "$file" "-result.json")
              rm -f allure-results/${uuid}-attachment.* || true
            done
          fi
          
          allure generate ./allure-results --clean -o ./allure-history

      - name: Deploy on GitHub pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history