name: UI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Run playwright tests with pytest and generate allure results
        run: xvfb-run pytest -m regression --alluredir=./allure-results --numprocesses=2

      # Пытаемся скачать ветку gh-pages в отдельную папку. Если ветки нет — идем дальше.
      - name: Load Allure History
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      # Создаем структуру папок и безопасно копируем историю (даже если ветки еще не существовало)
      - name: Environment Preparation for Allure
        if: always()
        run: |
          mkdir -p allure-results
          mkdir -p gh-pages-dir/history
          if [ -d "gh-pages-dir/history" ]; then
            cp -r gh-pages-dir/history ./allure-results/ || true
          fi

      - name: Install Allure CLI and Generate Report
        if: always()
        run: |
          sudo wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          sudo tar -zxvf allure-2.24.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.24.0/bin/allure /usr/bin/allure
          
          allure generate ./allure-results --clean -o ./allure-history

      - name: Deploy on GitHub pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history